services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: polymarket
      POSTGRES_USER: poly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poly}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poly -d polymarket"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://poly:${POSTGRES_PASSWORD:-poly}@db:5432/polymarket
      DATABASE_URL_SYNC: postgresql+psycopg2://poly:${POSTGRES_PASSWORD:-poly}@db:5432/polymarket
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-me-to-a-long-random-string}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      YANDEX_LLM_API_KEY: ${YANDEX_LLM_API_KEY:-}
      YANDEX_LLM_FOLDER_ID: ${YANDEX_LLM_FOLDER_ID:-}
      YANDEX_LLM_TIMEOUT_SECONDS: ${YANDEX_LLM_TIMEOUT_SECONDS:-600}
      YANDEX_SEARCH_API_KEY: ${YANDEX_SEARCH_API_KEY:-}
      YANDEX_SEARCH_FOLDER_ID: ${YANDEX_SEARCH_FOLDER_ID:-}
      POLYMARKET_PRIVATE_KEY: ${POLYMARKET_PRIVATE_KEY:-}
      POLYMARKET_API_KEY: ${POLYMARKET_API_KEY:-}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-}
      POLYMARKET_API_PASSPHRASE: ${POLYMARKET_API_PASSPHRASE:-}
      POLYMARKET_PROXY_ADDRESS: ${POLYMARKET_PROXY_ADDRESS:-}
      POLYMARKET_SIGNATURE_TYPE: ${POLYMARKET_SIGNATURE_TYPE:-}
      QDRANT_URL: "http://qdrant:6333"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      UVICORN_RELOAD: "1"
    volumes:
      # Dev only — remove in production for image-based deploys
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    working_dir: /app
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pgdata:
  qdrantdata:
  frontend_node_modules:
